name: cicd

on: push

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      -name: checkout  repo
       uses: actions/checkout@v2

      -name: setup nodejs
       uses: actions/setup-node@v2
       with:
         node-version: 16

      -name: Download dependencies
       run: npm install

       -name: run tests
        run: npm run tests
        
  

